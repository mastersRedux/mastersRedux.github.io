<!doctype html>
<html lang="en">
  <head>

    <meta charset="utf-8">

    <title>Using Parameters</title>

    <script>

    	function passParameter(greeting, number){

    	}


    </script>

  <body>

  	<button onclick="passParameter('hi', 2)">Click me</button>


  </body>
