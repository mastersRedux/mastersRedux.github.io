// My first for loop
	
function firstForFunction() {
	var someStates ="";
	for(i=0; i < listOfStates.length; i++) {
		//alert(listOfStates[i]);
		someStates += "<br>" + listOfStates[i];
		document.getElementById("USStates").innerHTML = someStates;
	}
	
}

function firstForInFunction() {
	var someStates ="";
	for(x in listOfStates) {
		someStates += "<br>" + listOfStates[x];
		document.getElementById("USStates").innerHTML = someStates;
	}
	
}
